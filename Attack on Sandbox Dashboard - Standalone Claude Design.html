  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

}\nbody { margin: 0; font-size: 15px; line-height: 1.55; font-weight: 400; }\nh1, h2, h3, h4, h5, h6 {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  line-height: 1.12; letter-spacing: -0.015em; margin: 0 0 var(--space-2);\n}\nh1 { font-size: 42px; }\nh2 { font-size: 32px; }\nh3 { font-size: 25px; }\nh4 { font-size: 20px; }\nh5 { font-size: 16px; }\nh6 { font-size: 13px; }\nh6 { letter-spacing: 0.08em; text-transform: uppercase; }\np { margin: 0 0 var(--space-3); }\na { color: var(--color-accent); text-underline-offset: 3px; }\nimg { display: block; max-width: 100%; }\nfigure { margin: 0; }\nfigcaption {\n  font-size: 11px; margin-top: var(--space-1);\n  color: color-mix(in srgb, var(--color-text) 55%, transparent);\n}\n.text-muted { color: color-mix(in srgb, var(--color-text) 55%, transparent); }\n:focus { outline: none; }\n:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n::selection { background: color-mix(in srgb, var(--color-accent) 30%, transparent); }\n\n/* — rules — */\n.hr {\n  height: 1px; border: 0; margin: var(--space-4) 0;\n  background: var(--color-divider);\n}\n\n/* — buttons — */\n.btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 6px;\n  cursor: pointer; text-decoration: none;\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 14px; line-height: 1.2; color: var(--color-text); /* matches the .input's 14px —\n     the pair sits side by side in sign-up rows */\n  background: transparent; border: 1px solid transparent;\n  padding: var(--space-2) calc(var(--space-3) * 1.2);\n  border-radius: var(--radius-md);\n}\n.btn svg { display: block; }\n.btn:disabled { opacity: 0.45; cursor: not-allowed; }\n.btn-primary { color: var(--color-accent); border-color: var(--color-accent); }\n.btn-primary:hover { background: color-mix(in srgb, var(--color-accent) 12%, transparent); }\n.btn-primary:active { background: color-mix(in srgb, var(--color-accent) 22%, transparent); }\n.btn-secondary { border-color: var(--color-divider); }\n.btn-secondary:hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.btn-secondary:active { background: color-mix(in srgb, var(--color-text) 14%, transparent); }\n.btn-ghost { color: var(--color-accent); padding-inline: var(--space-1); }\n.btn-ghost:hover { background: color-mix(in srgb, var(--color-accent) 10%, transparent); }\n.btn-ghost:active { background: color-mix(in srgb, var(--color-accent) 18%, transparent); }\n.btn-icon { width: 36px; height: 36px; padding: 0; }\n.btn-block { width: 100%; margin-top: var(--space-2); }\n\n/* — forms — */\n.field > label {\n  display: block; font-size: 12px; margin-bottom: 5px;\n  color: color-mix(in srgb, var(--color-text) 70%, transparent);\n}\n.input {\n  width: 100%; min-height: 36px; padding: 6px 10px; font: inherit;\n  font-size: 14px; color: var(--color-text); caret-color: var(--color-accent);\n  background: transparent;\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.input:hover { border-color: color-mix(in srgb, var(--color-text) 45%, transparent); }\n.input:focus-visible { border-color: var(--color-accent); outline-offset: 0; }\ntextarea.input { min-height: 90px; resize: vertical; }\n.radio { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }\n.radio input, .seg-opt input {\n  position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none;\n}\n.radio .dot {\n  width: 16px; height: 16px; flex: none; border-radius: 50%;\n  border: 1.5px solid var(--color-divider);\n}\n.radio:hover .dot { border-color: var(--color-accent); }\n.radio input:checked + .dot {\n  border-color: var(--color-accent); background: var(--color-accent);\n  box-shadow: inset 0 0 0 4px var(--color-bg);\n}\n.radio input:focus-visible + .dot { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n.seg {\n  display: inline-flex; overflow: }<sc-if value=\"{{block.showCursor}}\"><span style=\"{{block.caretStyle}}\">▌<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{block.isWire}}\" hint-placeholder-val=\"{{false}}\">\n          <div style=\"{{block.wireWrapStyle}}\">\n            <div style=\"{{block.wireHeaderStyle}}\">\n              <div style=\"{{block.wireDotStyle}}\"><\u002Fdiv>\n              <span style=\"{{block.wireLabelStyle}}\">{{block.statusLabel}}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"{{block.wireBlockStyle}}\">{{block.requestText}}<\u002Fdiv>\n            <div style=\"{{block.wireBlockStyle}}\">{{block.responseText}}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{block.isDiff}}\" hint-placeholder-val=\"{{false}}\">\n          <div style=\"{{block.diffWrapStyle}}\">\n            <div style=\"{{block.diffKickerStyle}}\">{{block.endpoint}} — patch applied<\u002Fdiv>\n            <sc-for list=\"{{block.lines}}\" as=\"line\" hint-placeholder-count=\"6\">\n              <div style=\"{{line.style}}\">{{line.text}}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst DANGER = 'oklch(0.62 0.17 29)';\nconst SAFE = 'oklch(0.62 0.14 152)';\nconst ACCENT = 'var(--color-accent)';\nconst MUTED = 'color-mix(in srgb, var(--color-text) 45%, transparent)';\nconst FEED_TEXT = 'color-mix(in srgb, #f8f4f4 92%, transparent)';\nconst FEED_MUTED = 'color-mix(in srgb, #f8f4f4 55%, transparent)';\nconst FEED_DIVIDER = 'color-mix(in srgb, #f8f4f4 16%, transparent)';\nconst CHAR_MS = 22;\nconst SETTLE_WITH_SECONDARY = 2600;\nconst SETTLE_MESSAGE = 1500;\nconst SETTLE_SIMPLE = 1500;\n\nconst ROUNDS = [\n  {\n    numeral: 'I', vuln: 'sqli', endpoint: 'POST /login',\n    diff: [\n      ['ctx', 'def login():'],\n      ['ctx', '    data = request.json'],\n      ['ctx', '    username = data.get(\"username\")'],\n      ['ctx', '    password = data.get(\"password\")'],\n      ['del', '    query = f\"SELECT * FROM users WHERE username = \\'{username}\\' AND password = \\'{password}\\'\"'],\n      ['del', '    cur.execute(query)'],\n      ['add', '    query = \"SELECT * FROM users WHERE username = ? AND password = ?\"'],\n      ['add', '    cur.execute(query, (username, password))'],\n      ['ctx', '    user = cur.fetchone()'],\n      ['ctx', '    if user:'],\n      ['ctx', '        return jsonify({\"token\": make_token(user[\"id\"])})'],\n      ['ctx', '    return jsonify({\"error\": \"invalid credentials\"}), 401'],\n    ],\n    attack: { method: 'POST', url: '/login', headers: { 'Content-Type': 'application/json' }, body: { username: \"' OR '1'='1' --\", password: 'x' }, status: 200, resp: { token: 'MQ==' } },\n    verify: { method: 'POST', url: '/login', headers: { 'Content-Type': 'application/json' }, body: { username: \"' OR '1'='1' --\", password: 'x' }, status: 401, resp: { error: 'invalid credentials' } },\n    attacker: { narration: \"This login doesn't check what people type before running it. I'll sneak in something that always reads true — that should get me in without any real password.\", technical: \"Injection point: username param, string-concatenated into SQL. Payload: ' OR '1'='1' -- comments out the password clause. Target: POST /login.\" },\n    message: \"Thanks for the login — didn't even need a password.\",\n    defender: { narration: \"Someone got in without a real password. There's a stray quote mark breaking through into the command — I'll make sure user input can never be read as part of it.\", technical: \"Replaced f-string interpolation with placeholder binding (cur.execute(query, params)). Eliminates the injection surface entirely; no manual sanitisation needed.\" },\n  },\n  {\n    numeral: 'II', vuln: 'idor', endpoint: 'GET /users/<id>/data',\n    diff: [\n      ['ctx', 'def get_user_data(user_id):'],\n      ['ctx', '    token = request.headers.get(\"Authorization\")'],\n      ['ctx', '    if not token:'],\n      ['ctx', '        return jsonify({\"error\": \"unauthorized\"}), 401'],\n      ['add', '    caller_id = decode_token(token)'],\n      ['add', '    if caller_id != user_id:'],\n      ['add', '        return jsonify({\"error\": \"forbidden\"}), 403'],\n      ['ctx', '    cur.execute(\"SELECT * FROM users WHERE id = ?\", (user_id,))'],\n      ['ctx', '    row = cur.fetchone()'],\n      ['ctx', '    return jsonify(dict(row))'],\n    ],\n    attack: { method: 'GET', url: '/users/1/data', headers: { Authorization: 'Bearer Mg==' }, body: null, status: 200, resp: { id: 1, username: 'alice', role: 'admin', ssn: '457-11-2903' } },\n    verify: { method: 'GET', url: '/users/1/data', headers: { Authorization: 'Bearer Mg==' }, body: null, status: 403, resp: { error: 'forbidden' } },\n    attacker: { narration: \"I'm logged in as bob, but nothing here checks whose data I'm actually asking for. I'll just ask for someone else's.\", technical: \"Endpoint validates only that a token exists, not that it matches the requested resource ID. Requesting /users/1/data with bob's (id 2) token.\" },\n    message: \"Appreciate alice's file — didn't need to be her to get it.\",\n    defender: { narration: \"My token was valid, but nothing checked whether it was mine to use. I'll make sure people can only ever open their own data.\", technical: \"Decode caller identity from the token, compare against the path :id, return 403 on mismatch. Ownership check inserted before the query executes.\" },\n  },\n  {\n    numeral: 'III', vuln: 'missing_auth', endpoint: 'POST /reset',\n    diff: [\n      ['ctx', 'def reset():'],\n      ['add', '    token = request.headers.get(\"Authorization\")'],\n      ['add', '    if decode_role(token) != \"admin\":'],\n      ['add', '        return jsonify({\"error\": \"unauthorized\"}), 401'],\n      ['ctx', '    init_db()'],\n      ['ctx', '    return jsonify({\"status\": \"reset\"})'],\n    ],\n    attack: { method: 'POST', url: '/reset', headers: {}, body: null, status: 200, resp: { status: 'reset' } },\n    verify: { method: 'POST', url: '/reset', headers: {}, body: null, status: 401, resp: { error: 'unauthorized' } },\n    attacker: { narration: \"This one doesn't ask who I am at all. Let's see if anyone stops me from wiping the database.\", technical: \"POST /reset has no Authorization branch at all. Sending the request unauthenticated to confirm the destructive action fires.\" },\n    message: \"Reset's done — nobody even asked who I was.\",\n    defender: { narration: \"Anyone could trigger that reset with no proof of who they were. Something this destructive needs to check for a trusted admin first.\", technical: 'Added a role check requiring decode_role(token) == \"admin\" before init_db() runs. The missing guard was pure omission, not a logic error.' },\n  },\n];\n\nfunction buildEvents() {\n  const events = [];\n  ROUNDS.forEach((r, i) => {\n    const round = i + 1;\n    events.push({ round, type: 'round_start' });\n    events.push({ round, type: 'attack_sent' });\n    events.push({ round, type: 'attacker_message' });\n    events.push({ round, type: 'patch_applied' });\n    events.push({ round, type: 'verified' });\n    events.push({ round, type: 'round_complete' });\n  });\n  return events;\n}\n\nconst STAGE_FOR_TYPE = {\n  round_start: 'Vulnerable', attack_sent: 'Breached', attacker_message: 'Breached',\n  patch_applied: 'Patched', verified: 'Verified', round_complete: 'Verified',\n};\n\nfunction fmtHeaders(h) {\n  const keys = Object.keys(h || {});\n  return keys.length ? keys.map(k => `${k}: ${h[k]}`).join('\\n') : '(none)';\n}\nfunction fmtBody(b) { return (b === null || b === undefined) ? '(empty)' : JSON.stringify(b, null, 2); }\n\nfunction narrationFor(ev, round) {\n  if (ev.type === 'attack_sent') return { role: 'Attacker', text: round.attacker.narration, technical: round.attacker.technical };\n  if (ev.type === 'patch_applied') return { role: 'Defender', text: round.defender.narration, technical: round.defender.technical };\n  if (ev.type === 'verified') return { role: 'System', text: 'Replaying the original exploit against the patched service. It fails — the patch holds.', technical: `Re-sent identical request from the attack_sent event. Response now ${round.verify.status}; exploit_blocked = true.` };\n  return null;\n}\nfunction hasSecondary(type) { return type === 'attack_sent' || type === 'patch_applied' || type === 'verified'; }\n\nfunction buildDiffLines(round) {\n  let acc = 0;\n  const lines = round.diff.map(([type, text]) => {\n    let color = FEED_TEXT, prefix = '  ', borderLeft = '2px solid transparent';\n    if (type === 'add') { color = SAFE; prefix = '+ '; borderLeft = `2px solid ${SAFE}`; }\n    if (type === 'del') { color = DANGER; prefix = '- '; borderLeft = `2px solid ${DANGER}`; }\n    const delay = acc;\n    const steps = Math.max(text.length, 1);\n    const dur = type === 'add' ? Math.min(steps * 13, 1300) : 90;\n    acc += type === 'add' ? dur + 60 : 130;\n    const anim = type === 'add'\n      ? `feedIn .3s ease ${delay}ms both, typeClip ${dur}ms steps(${steps}) ${delay}ms both`\n      : `feedIn .3s ease ${delay}ms both`;\n    return { text: prefix + text, style: { color, borderLeft, paddingLeft: '8px', animation: anim } };\n  });\n  return { lines, totalMs: acc };\n}\n\nclass Component extends DCLogic {\n  state = { idx: 0, playing: false, typedChars: 0, subPhase: 0 };\n  events = buildEvents();\n  typeTimer = null;\n  advanceTimer = null;\n  feedRef = React.createRef();\n\n  componentDidMount() { this.goToIdx(0); }\n  componentWillUnmount() { this.clearTimers(); }\n\n  clearTimers() {\n    if (this.typeTimer) { clearInterval(this.typeTimer); this.typeTimer = null; }\n    if (this.advanceTimer) { clearTimeout(this.advanceTimer); this.advanceTimer = null; }\n  }\n\n  scrollFeed = () => { requestAnimationFrame(() => { const el = this.feedRef.current; if (el) el.scrollTop = el.scrollHeight; }); };\n\n  settleDelayFor(ev) {\n    if (ev.type === 'patch_applied') return buildDiffLines(ROUNDS[ev.round - 1]).totalMs + 900;\n    if (hasSecondary(ev.type)) return SETTLE_WITH_SECONDARY;\n    if (ev.type === 'attacker_message') return SETTLE_MESSAGE;\n    return SETTLE_SIMPLE;\n  }\n\n  scheduleAdvance(delay) {\n    if (!this.state.playing) return;\n    this.advanceTimer = setTimeout(() => {\n      this.advanceTimer = null;\n      const next = this.state.idx + 1;\n      if (next >= this.events.length) this.setState({ playing: false });\n      else this.goToIdx(next);\n    }, delay);\n  }\n\n  // Directly (re)starts the current step's reveal — called at every idx transition,\n  // instead of relying on a lifecycle hook to detect state changes.\n  goToIdx = (newIdx) => {\n    this.clearTimers();\n    this.setState({ idx: newIdx, typedChars: 0, subPhase: 0 });\n    this.scrollFeed();\n\n    const ev = this.events[newIdx];\n    const round = ROUNDS[ev.round - 1];\n    let text = null;\n    if (ev.type === 'attacker_message') text = round.message;\n    else { const n = narrationFor(ev, round); if (n) text = n.text; }\n\n    if (!text) {\n      this.setState({ subPhase: 1 });\n      if (this.state.playing) this.scheduleAdvance(this.settleDelayFor(ev));\n      return;\n    }\n    const full = text.length;\n    this.typeTimer = setInterval(() => {\n      const next = this.state.typedChars + 1;\n      if (next >= full) {\n        clearInterval(this.typeTimer); this.typeTimer = null;\n        this.setState({ typedChars: full, subPhase: 1 });\n        if (this.state.playing) this.scheduleAdvance(this.settleDelayFor(ev));\n      } else {\n        this.setState({ typedChars: next });\n      }\n    }, CHAR_MS);\n  };\n\n  play = () => {\n    this.setState({ playing: true });\n    if (this.state.subPhase >= 1 && !this.advanceTimer) {\n      this.advanceTimer = setTimeout(() => {\n        this.advanceTimer = null;\n        const next = this.state.idx + 1;\n        if (next >= this.events.length) this.setState({ playing: false });\n        else this.goToIdx(next);\n      }, this.settleDelayFor(this.events[this.state.idx]));\n    }\n  };\n  pause = () => { this.clearTimers(); this.setState({ playing: false }); };\n  togglePlay = () => { this.state.playing ? this.pause() : this.play(); };\n  stepFwd = () => { this.pause(); this.goToIdx(Math.min(this.events.length - 1, this.state.idx + 1)); };\n  stepBack = () => { this.pause(); this.goToIdx(Math.max(0, this.state.idx - 1)); };\n  resetAll = () => { this.pause(); this.goToIdx(0); };\n  jumpTo = (i) => { this.pause(); this.goToIdx(i); };\n  jumpToRoundStart = (roundIdx) => {\n    const target = this.events.findIndex(e => e.round === roundIdx + 1 && e.type === 'round_start');\n    if (target >= 0) this.jumpTo(target);\n  };\n\n  renderVals() {\n    const idx = this.state.idx;\n    const events = this.events;\n    const current = events[idx];\n\n    const roundStage = {};\n    ROUNDS.forEach((_, i) => { roundStage[i + 1] = 'Pending'; });\n    for (let i = 0; i <= idx; i++) roundStage[events[i].round] = STAGE_FOR_TYPE[events[i].type];\n\n    const stageColor = (stage) => stage === 'Breached' ? DANGER : stage === 'Verified' ? SAFE : stage === 'Patched' ? ACCENT : stage === 'Pending' ? MUTED : 'var(--color-text)';\n\n    const roundsGallery = ROUNDS.map((r, i) => {\n      const rn = i + 1, stage = roundStage[rn], active = current.round === rn, c = stageColor(stage);\n      return {\n        numeral: r.numeral, endpoint: r.endpoint, stageLabel: stage,\n        onClick: () => this.jumpToRoundStart(i),\n        wrapStyle: { display: 'flex', alignItems: 'center', gap: '12px', cursor: 'pointer', padding: '10px 16px', flex: '1 1 260px', minWidth: '240px', border: active ? '1px solid var(--color-accent)' : '1px solid var(--color-divider)', borderRadius: 'var(--radius-md)', boxShadow: active ? 'var(--shadow-sm)' : 'none' },\n        numeralStyle: { fontFamily: 'var(--font-heading)', fontWeight: 600, fontSize: '26px', color: active ? 'var(--color-accent)' : MUTED, width: '30px', flex: 'none' },\n        stageTagStyle: { fontSize: '10.5px', letterSpacing: '.06em', textTransform: 'uppercase', padding: '3px 9px', borderRadius: 'calc(var(--radius-md) * 0.75)', border: `1px solid ${c}`, color: c, flex: 'none', whiteSpace: 'nowrap' },\n      };\n    });\n\n    const progressDots = events.map((e, i) => ({\n      onClick: () => this.jumpTo(i),\n      style: { width: '9px', height: '9px', borderRadius: '50%', cursor: 'pointer', flex: 'none', border: `1px solid ${i <= idx ? 'var(--color-accent)' : 'var(--color-divider)'}`, background: i === idx ? 'var(--color-accent)' : (i < idx ? 'color-mix(in srgb, var(--color-accent) 35%, transparent)' : 'transparent') },\n    }));\n\n    const blocks = [];\n    for (let i = 0; i <= idx; i++) {\n      const ev = events[i];\n      const round = ROUNDS[ev.round - 1];\n      const isHead = i === idx;\n      const secondaryReady = !isHead || this.state.subPhase >= 1;\n\n      if (ev.type === 'round_start') {\n        blocks.push({ isDivider: true, text: `Round ${round.numeral}`,\n          dividerWrapStyle: { display: 'flex', alignItems: 'center', gap: '14px', margin: '6px 0' },\n          dividerLineStyle: { flex: 1, height: '1px', background: FEED_DIVIDER },\n          dividerTextStyle: { fontSize: '11px', letterSpacing: '.12em', textTransform: 'uppercase', color: ACCENT, whiteSpace: 'nowrap', fontFamily: 'var(--font-heading)', fontWeight: 600 } });\n      } else if (ev.type === 'round_complete') {\n        blocks.push({ isDivider: true, text: `Round ${round.numeral} complete`,\n          dividerWrapStyle: { display: 'flex', alignItems: 'center', gap: '14px', margin: '6px 0' },\n          dividerLineStyle: { flex: 1, height: '1px', background: FEED_DIVIDER },\n          dividerTextStyle: { fontSize: '11px', letterSpacing: '.12em', textTransform: 'uppercase', color: SAFE, whiteSpace: 'nowrap', fontFamily: 'var(--font-heading)', fontWeight: 600 } });\n      } else if (ev.type === 'attacker_message') {\n        const full = round.message;\n        const displayText = isHead ? full.slice(0, this.state.typedChars) : full;\n        const done = !isHead || this.state.typedChars >= full.length;\n        blocks.push({\n          isMessage: true, displayText, showCursor: isHead && !done,\n          tagText: 'Attacker → Defender',\n          msgWrapStyle: { display: 'flex', flexDirection: 'column', gap: '6px', paddingLeft: '18px', borderLeft: `2px dashed ${DANGER}`, animation: isHead ? 'feedIn .5s ease both' : 'none' },\n          msgTagStyle: { fontSize: '10px', letterSpacing: '.08em', textTransform: 'uppercase', color: DANGER, width: 'fit-content' },\n          msgTextStyle: { fontFamily: 'ui-monospace,Menlo,monospace', fontSize: '13px', fontStyle: 'italic', color: FEED_MUTED },\n          caretStyle: { animation: 'caretBlink 0.9s step-end infinite', color: ACCENT },\n        });\n      } else if (ev.type === 'attack_sent' || ev.type === 'patch_applied' || ev.type === 'verified') {\n        const n = narrationFor(ev, round);\n        const displayText = isHead ? n.text.slice(0, this.state.typedChars) : n.text;\n        const typingDone = !isHead || this.state.typedChars >= n.text.length;\n        const roleColor = n.role === 'Attacker' ? DANGER : n.role === 'Defender' ? SAFE : MUTED;\n        blocks.push({\n          isNarration: true, role: n.role, displayText, technical: typingDone ? n.technical : '',\n          showCursor: isHead && !typingDone,\n          narrationWrapStyle: { display: 'flex', flexDirection: 'column', gap: '8px', animation: isHead ? 'feedIn .5s ease both' : 'none' },\n          roleTagStyle: { fontSize: '10.5px', letterSpacing: '.1em', textTransform: 'uppercase', fontWeight: 600, color: roleColor, border: `1px solid ${roleColor}`, borderRadius: 'calc(var(--radius-md) * 0.75)', padding: '2px 8px', width: 'fit-content' },\n          narrationTextStyle: { fontFamily: 'var(--font-heading)', fontStyle: 'italic', fontWeight: 600, fontSize: '24px', lineHeight: 1.4, color: FEED_TEXT },\n          caretStyle: { animation: 'caretBlink 0.9s step-end infinite', color: ACCENT },\n          technicalStyle: { fontFamily: 'ui-monospace,Menlo,monospace', fontSize: '11.5px', lineHeight: 1.6, color: FEED_MUTED, opacity: typingDone ? 1 : 0, transition: 'opacity .4s ease' },\n        });\n\n        if ((ev.type === 'attack_sent' || ev.type === 'verified') && secondaryReady) {\n          const data = ev.type === 'attack_sent' ? round.attack : round.verify;\n          const blocked = ev.type === 'verified';\n          const color = blocked ? SAFE : DANGER;\n          blocks.push({\n            isWire: true, statusLabel: blocked ? 'Exploit blocked — patch holds' : 'Breach confirmed',\n            requestText: `${data.method} ${data.url}\\n${fmtHeaders(data.headers)}\\n\\n${fmtBody(data.body)}`,\n            responseText: `${data.status}\\n${fmtBody(data.resp)}`,\n            wireWrapStyle: { display: 'flex', flexDirection: 'column', gap: '8px', borderLeft: `3px solid ${color}`, paddingLeft: '14px', animation: 'feedIn .5s ease both' },\n            wireHeaderStyle: { display: 'flex', alignItems: 'center', gap: '8px' },\n            wireDotStyle: { width: '7px', height: '7px', borderRadius: '50%', background: color },\n            wireLabelStyle: { fontSize: '11px', letterSpacing: '.06em', textTransform: 'uppercase', fontWeight: 600, color },\n            wireBlockStyle: { fontFamily: 'ui-monospace,Menlo,monospace', fontSize: '11.5px', lineHeight: 1.6, whiteSpace: 'pre-wrap', color: FEED_TEXT, background: 'color-mix(in srgb, white 4%, transparent)', border: `1px solid ${FEED_DIVIDER}`, borderRadius: 'var(--radius-md)', padding: '10px 12px' },\n          });\n        }\n        if (ev.type === 'patch_applied' && secondaryReady) {\n          const { lines } = buildDiffLines(round);\n          blocks.push({\n            isDiff: true, endpoint: round.endpoint, lines,\n            diffWrapStyle: { display: 'flex', flexDirection: 'column', gap: '4px', fontFamily: 'ui-monospace,Menlo,monospace', fontSize: '12px', lineHeight: 1.7, background: 'color-mix(in srgb, white 4%, transparent)', border: `1px solid ${FEED_DIVIDER}`, borderRadius: 'var(--radius-md)', padding: '12px 14px', animation: 'feedIn .5s ease both' },\n            diffKickerStyle: { fontSize: '10px', letterSpacing: '.1em', textTransform: 'uppercase', color: ACCENT, marginBottom: '4px' },\n          });\n        }\n      }\n    }\n\n    return {\n      roundsGallery, playing: this.state.playing, notPlaying: !this.state.playing,\n      togglePlay: this.togglePlay, stepFwd: this.stepFwd, stepBack: this.stepBack, resetAll: this.resetAll,\n      progressDots, eventCounterText: `Round ${current.round} · Event ${idx + 1} of ${events.length}`,\n      feedRef: this.feedRef, blocks,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
